name: release
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: |
          npm ci
      - run: npm publish --tag ${{ github.event.release.tag_name }}
